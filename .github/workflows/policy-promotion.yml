# ⚠️ SECURITY WARNING:
# Integration tests connect to a real Intune tenant. Do not run integration tests
# on public repositories as workflow logs are public and may contain sensitive data.

name: Policy Promotion

on:
    pull_request:
        branches: [main]
        types: [opened, synchronize, reopened]

    workflow_dispatch:
        inputs:
            policy_id:
                description: "Policy ID (GUID)"
                required: true
                type: string
            current_stage:
                description: "Current stage"
                required: true
                default: "dev"
                type: choice
                options:
                    - dev
                    - test
                    - prod
            compliance_threshold:
                description: "Compliance threshold (%)"
                required: false
                default: "80"
                type: string
            auto_promote:
                description: "Auto promote"
                required: false
                default: false
                type: boolean

concurrency:
    group: ${{ github.repository }}-policy-promotion-${{ github.ref }}
    cancel-in-progress: false

permissions:
    id-token: write
    contents: read
    pull-requests: read
    actions: read

env:
    POWERSHELL_TELEMETRY_OPTOUT: 1

jobs:
    parse-pr:
        name: Parse PR
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        outputs:
            policy_id:            ${{ steps.parse.outputs.policy_id }}
            current_stage:        ${{ steps.parse.outputs.current_stage }}
            compliance_threshold: ${{ steps.parse.outputs.compliance_threshold }}
            auto_promote:         ${{ steps.parse.outputs.auto_promote }}

        steps:
            - name: Parse PR body
              id: parse
              uses: actions/github-script@v7
              with:
                  script: |
                      const body = context.payload.pull_request.body || '';

                      const extract = (label) => {
                          const regex = new RegExp(`\\*\\*${label}[^*]*\\*\\*[^\\S\\r\\n]*([^\\r\\n]+)`, 'i');
                          const match = body.match(regex);
                          return match ? match[1].trim() : '';
                      };

                      const policyId    = extract('Policy ID \\(GUID\\)');
                      const stage       = extract('Current Stage');
                      const threshold   = extract('Compliance Threshold \\(%\\)') || '80';
                      const autoPromote = extract('Auto Promote').toLowerCase() === 'yes';

                      if (!policyId) {
                          core.setFailed('Policy ID is required in the PR body.');
                          return;
                      }

                      core.setOutput('policy_id', policyId);
                      core.setOutput('current_stage', stage || 'dev');
                      core.setOutput('compliance_threshold', threshold);
                      core.setOutput('auto_promote', autoPromote.toString());

                      core.info(`Policy ID: ${policyId}`);
                      core.info(`Stage: ${stage}`);
                      core.info(`Threshold: ${threshold}%`);
                      core.info(`Auto Promote: ${autoPromote}`);

    promote:
        name: Promote
        runs-on: ubuntu-latest
        needs: [parse-pr]
        if: |
            always() &&
            (github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'pull_request' && needs.parse-pr.result == 'success'))

        environment:
            name: ${{ github.event_name == 'workflow_dispatch' && inputs.current_stage || needs.parse-pr.outputs.current_stage }}
            url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

        steps:
            - uses: actions/checkout@v4

            - name: Request OIDC token
              id: oidc
              shell: bash
              run: |
                  OIDC_TOKEN="$(curl -s -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                    "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r .value)"
                  echo "oidc_token=$OIDC_TOKEN" >> $GITHUB_OUTPUT
                  echo "::add-mask::$OIDC_TOKEN"

            - name: Install modules
              shell: pwsh
              run: |
                  $ProgressPreference = 'SilentlyContinue'
                  if (-not (Get-Module -ListAvailable -Name Microsoft.Graph.Authentication)) {
                      Install-Module -Name Microsoft.Graph.Authentication -Force -Scope CurrentUser
                  }

            - name: Run promotion analysis
              shell: pwsh
              env:
                  AZURE_CLIENT_ID:        ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_TENANT_ID:        ${{ secrets.AZURE_TENANT_ID }}
                  OIDC_TOKEN:             ${{ steps.oidc.outputs.oidc_token }}
                  INTUNESTACK_DEV_GROUP:  ${{ vars.INTUNESTACK_DEV_GROUP }}
                  INTUNESTACK_TEST_GROUP: ${{ vars.INTUNESTACK_TEST_GROUP }}
                  INTUNESTACK_PROD_GROUP: ${{ vars.INTUNESTACK_PROD_GROUP }}
              run: |
                  if ($env:AZURE_TENANT_ID) { Write-Output "::add-mask::$env:AZURE_TENANT_ID" }
                  if ($env:AZURE_CLIENT_ID) { Write-Output "::add-mask::$env:AZURE_CLIENT_ID" }
                  if ($env:OIDC_TOKEN)      { Write-Output "::add-mask::$env:OIDC_TOKEN" }

                  . ./Public/Write-Log.ps1
                  Import-Module ./IntuneStack.psd1

                  $policyId  = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { '${{ inputs.policy_id }}' } else { '${{ needs.parse-pr.outputs.policy_id }}' }
                  $stage     = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { '${{ inputs.current_stage }}' } else { '${{ needs.parse-pr.outputs.current_stage }}' }
                  $threshold = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { [int]'${{ inputs.compliance_threshold }}' } else { [int]'${{ needs.parse-pr.outputs.compliance_threshold }}' }
                  $auto      = if ($env:GITHUB_EVENT_NAME -eq 'workflow_dispatch') { '${{ inputs.auto_promote }}' -eq 'true' } else { '${{ needs.parse-pr.outputs.auto_promote }}' -eq 'true' }

                  if ($policyId) { Write-Output "::add-mask::$policyId" }

                  $params = @{
                      PolicyId            = $policyId
                      CurrentStage        = $stage
                      ComplianceThreshold = $threshold
                  }

                  if ($auto) { $params.AutoPromote = $true }

                  $result = Start-PolicyPromotionAnalysis @params
                  exit ([int](-not $result))

            - name: Upload promotion report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: promotion-report
                  path: Logs/promotion-report.json
                  retention-days: 7
                  if-no-files-found: ignore

            - name: Summary
              if: always()
              shell: bash
              run: |
                  cat >> $GITHUB_STEP_SUMMARY << 'EOF'
                  # Policy Promotion

                  | Setting | Value |
                  |---------|-------|
                  | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |
                  EOF
