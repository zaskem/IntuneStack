name: PR Validation

on:
    pull_request:
        branches: [ main, development ]
        paths:
            - "**/*.ps1"
            - "**/*.psm1"
            - "**/*.psd1"

permissions:
    contents: read
    checks: write
    pull-requests: read

jobs:
    pr-validation:
        name: Quality Gate
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Install modules
              shell: pwsh
              run: |
                  $ProgressPreference = 'SilentlyContinue'
                  Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
                  Install-Module -Name Pester -Force -Scope CurrentUser -MinimumVersion 5.0 -AllowClobber

            - name: Get changed PowerShell files
              id: changed-files
              uses: tj-actions/changed-files@v40
              with:
                  files: |
                      **/*.ps1
                      **/*.psm1
                      **/*.psd1

            - name: PSScriptAnalyzer
              if: steps.changed-files.outputs.any_changed == 'true'
              shell: pwsh
              run: |
                  $changedFiles = @(${{ steps.changed-files.outputs.all_changed_files }})
                  $errorCount   = 0
                  $warningCount = 0

                  foreach ($file in $changedFiles) {
                      if (-not (Test-Path $file)) { continue }

                      $results = Invoke-ScriptAnalyzer -Path $file -Settings "./config/PSScriptAnalyzerSettings.psd1"

                      if ($results) {
                          $errorCount   += ($results | Where-Object Severity -eq 'Error').Count
                          $warningCount += ($results | Where-Object Severity -eq 'Warning').Count

                          foreach ($result in $results) {
                              $level = switch ($result.Severity) {
                                  'Error'       { 'error' }
                                  'Warning'     { 'warning' }
                                  'Information' { 'notice' }
                              }
                              Write-Output "::$level file=$file,line=$($result.Line),col=$($result.Column)::$($result.RuleName): $($result.Message)"
                          }
                      }
                  }

                  Write-Output "Files changed: $($changedFiles.Count) | Errors: $errorCount | Warnings: $warningCount"

                  if ($errorCount -gt 0) {
                      Write-Output "PSScriptAnalyzer errors found. Fix before merging."
                      exit 1
                  }

            - name: Pester
              shell: pwsh
              run: |
                  $config = New-PesterConfiguration
                  $config.Run.Path = "./tests"
                  $config.TestResult.Enabled = $true
                  $config.TestResult.OutputPath = "./test-results.xml"
                  $config.TestResult.OutputFormat = "NUnitXml"
                  $config.Output.Verbosity = "Detailed"

                  $results = Invoke-Pester -Configuration $config
                  if ($results.FailedCount -gt 0) { exit 1 }

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: pester-results
                  path: test-results.xml
                  retention-days: 7
                  if-no-files-found: ignore
